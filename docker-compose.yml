services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
  api:
    build: ./backend
    env_file: ./backend/.env
    depends_on: [mongo]
    ports:
      - "5000:5000"
  web:
    build: ./client
    depends_on: [api]
    ports:
      - "8080:80"
volumes:
  mongo_data:
